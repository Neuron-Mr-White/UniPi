# Unipi — mise tasks for testing
#
# All-in-one:
#   mise run unipi           # Full Unipi suite (loads all from package.json)
#
# Individual (for debugging):
#   mise run workflow
#   mise run ralph
#   mise run memory
#   mise run info-screen
#   mise run btw
#   mise run subagents
#
# Utility:
#   mise run typecheck

[tasks.unipi]
description = "Launch pi with full Unipi suite"
run = "pi --no-extensions --no-skills -e packages/unipi/index.ts"

[tasks.workflow]
description = "Launch pi with workflow only"
run = "pi --no-extensions --no-skills -e packages/workflow/index.ts"

[tasks.ralph]
description = "Launch pi with ralph only"
run = "pi --no-extensions --no-skills -e packages/ralph/index.ts"

[tasks.memory]
description = "Launch pi with memory only"
run = "pi --no-extensions --no-skills -e packages/memory/index.ts"

[tasks.info-screen]
description = "Launch pi with info-screen only"
run = "pi --no-extensions --no-skills -e packages/info-screen/index.ts"

[tasks.btw]
description = "Launch pi with btw only"
run = "pi --no-extensions --no-skills -e packages/btw/extensions/btw.ts"

[tasks.subagents]
description = "Launch pi with subagents only"
run = "pi --no-extensions --no-skills -e packages/subagents/src/index.ts"

[tasks.typecheck]
description = "Run TypeScript type check"
run = "npx tsc --noEmit --skipLibCheck"

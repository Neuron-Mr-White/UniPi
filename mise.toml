# Unipi — mise tasks for testing extensions in isolation
#
# Usage:
#   mise run workspace          # Test workspace (info-screen) alone
#   mise run memory             # Test memory alone
#   mise run workspace+memory   # Test workspace + memory together
#   mise run core               # All working extensions
#   mise run ralph              # Test ralph alone
#   mise run typecheck          # TypeScript type check

[tasks.workspace]
description = "Launch pi with info-screen only"
run = "pi --no-extensions --no-skills -e packages/info-screen/index.ts"

[tasks.memory]
description = "Launch pi with memory only"
run = "pi --no-extensions --no-skills -e packages/memory/index.ts"

[tasks."workspace+memory"]
description = "Launch pi with info-screen + memory"
run = "pi --no-extensions --no-skills -e packages/info-screen/index.ts -e packages/memory/index.ts"

[tasks.core]
description = "Launch pi with all working extensions"
run = """
pi --no-extensions --no-skills \
    -e packages/info-screen/index.ts \
    -e packages/memory/index.ts \
    -e packages/ralph/index.ts \
    -e packages/subagents/src/index.ts \
    -e packages/workflow/index.ts
"""

[tasks.ralph]
description = "Launch pi with ralph only"
run = "pi --no-extensions --no-skills -e packages/ralph/index.ts"

[tasks.typecheck]
description = "Run TypeScript type check"
run = "npx tsc --noEmit --skipLibCheck"
